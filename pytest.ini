[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=apps
    --cov-report=html
    --cov-report=term-missing
    --strict-markers
    -v
testpaths = .
norecursedirs = .git .venv venv env build dist *.egg
